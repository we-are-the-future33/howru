<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>온보딩 미리보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root {
    --bg: #fafafa;
    --ink: #1a1a1a;
    --ink-soft: #5c5c5c;
    --ink-mute: #9a9a9a;
    --accent: #2bb673;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: 'Pretendard Variable', -apple-system, sans-serif;
    color: var(--ink);
    letter-spacing: -0.015em;
    min-height: 100vh;
  }

  .onboard {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .onboard::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(600px 400px at 10% -5%,  rgba(43,182,115,0.08)  0%, transparent 60%),
      radial-gradient(500px 400px at 100% 100%, rgba(74,144,226,0.06)  0%, transparent 55%);
  }
  .onboard-track {
    flex: 1;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
  }
  .onboard-track::-webkit-scrollbar { display: none; }

  .onboard-slide {
    flex: 0 0 100%;
    min-width: 100%;
    max-width: 480px;
    margin: 0 auto;
    scroll-snap-align: center;
    padding: 60px 32px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .onboard-illust {
    width: 100%;
    max-width: 280px;
    margin-bottom: 36px;
  }
  .onboard-illust svg {
    width: 100%;
    height: auto;
    display: block;
    animation: illustFloat 4s ease-in-out infinite;
  }
  @keyframes illustFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .onboard-title {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    font-weight: 400;
    font-style: italic;
    line-height: 1.2;
    margin: 0 0 16px;
    color: var(--ink);
    letter-spacing: -0.025em;
  }
  .onboard-title em {
    font-style: italic;
    color: var(--accent);
  }
  .onboard-desc {
    font-size: 15px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.6;
  }

  .onboard-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px 0 8px;
    position: relative;
    z-index: 1;
  }
  .onboard-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(0,0,0,0.12);
    transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
  }
  .onboard-dot.active {
    width: 28px;
    border-radius: 999px;
    background: var(--accent);
  }

  .onboard-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px 28px;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .onboard-skip {
    background: transparent;
    border: none;
    color: var(--ink-mute);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 14px 18px;
    flex-shrink: 0;
  }
  .btn {
    flex: 1;
    padding: 18px 22px;
    border: none;
    border-radius: 999px;
    background: var(--ink);
    color: white;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s;
  }
  .btn.final {
    background: var(--accent) !important;
    box-shadow: 0 8px 24px rgba(43, 182, 115, 0.3);
  }
</style>
</head>
<body>

<div class="onboard">
  <div class="onboard-track" id="track">
    <!-- Slide 1 -->
    <div class="onboard-slide">
      <div class="onboard-illust">
        <svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
          <g stroke="#2bb673" stroke-width="2" stroke-linecap="round" opacity="0.3">
            <line x1="140" y1="20" x2="140" y2="35"/>
            <line x1="200" y1="40" x2="190" y2="52"/>
            <line x1="80" y1="40" x2="90" y2="52"/>
            <line x1="225" y1="100" x2="210" y2="100"/>
            <line x1="55" y1="100" x2="70" y2="100"/>
          </g>
          <circle cx="140" cy="105" r="55" fill="#2bb673"/>
          <path d="M120 95 Q126 87 132 95" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M148 95 Q154 87 160 95" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <path d="M118 115 Q140 132 162 115" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          <g transform="translate(195,150)">
            <rect width="50" height="38" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
            <line x1="0" y1="12" x2="50" y2="12" stroke="#1a1a1a" stroke-width="1.5"/>
            <line x1="14" y1="0" x2="14" y2="6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <line x1="36" y1="0" x2="36" y2="6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <text x="25" y="30" text-anchor="middle" fill="#2bb673" font-family="Pretendard Variable, sans-serif" font-size="14" font-weight="700">25</text>
          </g>
          <g transform="translate(40,150)">
            <circle cx="20" cy="20" r="20" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
            <line x1="20" y1="20" x2="20" y2="9" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
            <line x1="20" y1="20" x2="28" y2="20" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <h3 class="onboard-title">하루에 한 번,<br/><em>오늘의 기분</em>을 기록해요</h3>
      <p class="onboard-desc">길게 쓸 필요 없어요. 두 번의 탭으로<br/>오늘이 어땠는지 남길 수 있어요.</p>
    </div>

    <!-- Slide 2 -->
    <div class="onboard-slide">
      <div class="onboard-illust">
        <svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
          <rect x="30" y="40" width="220" height="130" rx="14" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
          <g stroke="#e5e5e5" stroke-width="1">
            <line x1="40" y1="70" x2="240" y2="70"/>
            <line x1="40" y1="100" x2="240" y2="100"/>
            <line x1="40" y1="130" x2="240" y2="130"/>
          </g>
          <path d="M50 130 L80 110 L110 75 L140 95 L170 60 L200 80 L230 50 L230 160 L50 160 Z"
                fill="#2bb673" opacity="0.18"/>
          <path d="M50 130 L80 110 L110 75 L140 95 L170 60 L200 80 L230 50"
                stroke="#2bb673" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="50" cy="130" r="5" fill="#9ec5ef" stroke="white" stroke-width="2"/>
          <circle cx="80" cy="110" r="5" fill="#d4d4d4" stroke="white" stroke-width="2"/>
          <circle cx="110" cy="75" r="5" fill="#8fd4a3" stroke="white" stroke-width="2"/>
          <circle cx="140" cy="95" r="5" fill="#d4d4d4" stroke="white" stroke-width="2"/>
          <circle cx="170" cy="60" r="5" fill="#2bb673" stroke="white" stroke-width="2"/>
          <circle cx="200" cy="80" r="5" fill="#8fd4a3" stroke="white" stroke-width="2"/>
          <circle cx="230" cy="50" r="5" fill="#2bb673" stroke="white" stroke-width="2"/>
          <g transform="translate(20,15)">
            <circle cx="14" cy="14" r="14" fill="#2bb673"/>
            <path d="M9 12 Q11 9 13 12" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <path d="M15 12 Q17 9 19 12" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <path d="M9 17 Q14 21 19 17" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          </g>
          <g transform="translate(238,160)">
            <circle cx="14" cy="14" r="14" fill="#9ec5ef"/>
            <path d="M9 11 Q11 13 13 11" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <path d="M15 11 Q17 13 19 11" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <path d="M10 19 Q14 16 18 19" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
      </div>
      <h3 class="onboard-title">쌓이는 기록을<br/><em>한눈에</em> 살펴봐요</h3>
      <p class="onboard-desc">차트와 통계로 내 마음의 흐름이<br/>자연스럽게 보여요.</p>
    </div>

    <!-- Slide 3 -->
    <div class="onboard-slide">
      <div class="onboard-illust">
        <svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="140" cy="100" r="38" fill="#2bb673" opacity="0.15"/>
          <circle cx="140" cy="100" r="28" fill="#2bb673"/>
          <path d="M140 113 C 132 105, 125 98, 130 90 C 134 86, 140 90, 140 95 C 140 90, 146 86, 150 90 C 155 98, 148 105, 140 113 Z"
                fill="white"/>
          <circle cx="140" cy="100" r="55" fill="none" stroke="#2bb673" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.4"/>
          <circle cx="140" cy="100" r="78" fill="none" stroke="#2bb673" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.25"/>
          <g transform="translate(60,55)">
            <circle cx="14" cy="14" r="14" fill="#8fd4a3"/>
            <path d="M9 12 Q14 17 19 12" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <circle cx="11" cy="11" r="1.4" fill="#1a1a1a"/>
            <circle cx="17" cy="11" r="1.4" fill="#1a1a1a"/>
          </g>
          <g transform="translate(206,55)">
            <rect width="28" height="28" rx="8" fill="white" stroke="#1a1a1a" stroke-width="1.3"/>
            <line x1="6" y1="11" x2="22" y2="11" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="6" y1="16" x2="18" y2="16" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="6" y1="21" x2="20" y2="21" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
          </g>
          <g transform="translate(60,148)">
            <path d="M14 4 L17 11 L24 12 L19 17 L20 24 L14 21 L8 24 L9 17 L4 12 L11 11 Z"
                  fill="#f5d99a" stroke="#1a1a1a" stroke-width="1.3" stroke-linejoin="round"/>
          </g>
          <g transform="translate(206,148)">
            <circle cx="14" cy="14" r="14" fill="#9ec5ef"/>
            <path d="M14 8 L14 14 L18 16" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            <circle cx="14" cy="14" r="11" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
          </g>
        </svg>
      </div>
      <h3 class="onboard-title">나를 더 잘 이해하고,<br/><em>더 좋은 하루</em>를 설계해요</h3>
      <p class="onboard-desc">패턴을 알면 내일이 달라져요.<br/>오늘부터 시작해볼까요?</p>
    </div>
  </div>

  <div class="onboard-dots" id="dots">
    <span class="onboard-dot active"></span>
    <span class="onboard-dot"></span>
    <span class="onboard-dot"></span>
  </div>

  <div class="onboard-nav">
    <button class="onboard-skip" id="skip">건너뛰기</button>
    <button class="btn" id="next">다음</button>
  </div>
</div>

<script>
const TOTAL = 3;
let cur = 0;
const track = document.getElementById('track');
const dots = document.querySelectorAll('.onboard-dot');
const nextBtn = document.getElementById('next');
const skipBtn = document.getElementById('skip');

function update() {
  dots.forEach((d, i) => d.classList.toggle('active', i === cur));
  if (cur === TOTAL - 1) {
    nextBtn.textContent = '시작하기';
    nextBtn.classList.add('final');
  } else {
    nextBtn.textContent = '다음';
    nextBtn.classList.remove('final');
  }
}

nextBtn.addEventListener('click', () => {
  if (cur >= TOTAL - 1) {
    alert('온보딩 완료! (실제 앱에서는 체크인 저장이 이어짐)');
    return;
  }
  cur += 1;
  const slide = track.children[cur];
  track.scrollTo({ left: slide.offsetLeft, behavior: 'smooth' });
  update();
});

skipBtn.addEventListener('click', () => {
  alert('건너뛰기 (실제 앱에서는 체크인 저장이 이어짐)');
});

let scrollTimeout;
track.addEventListener('scroll', () => {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const idx = Math.round(track.scrollLeft / track.offsetWidth);
    if (idx !== cur && idx >= 0 && idx < TOTAL) {
      cur = idx;
      update();
    }
  }, 80);
});
</script>

</body>
</html>
