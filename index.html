<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  :root {
    /* Off-white minimal palette */
    --bg:         #fafafa;
    --bg-warm:    #f2f2f2;
    --surface:    #ffffff;
    --surface-2:  #f5f5f5;

    --ink:        #1a1a1a;
    --ink-soft:   #5c5c5c;
    --ink-mute:   #9a9a9a;

    /* Accent — vivid green */
    --accent:     #2bb673;
    --accent-soft:#c8ebd4;

    /* Level colors: VIVID GREEN (good) → GRAY → VIVID BLUE (rough) */
    --c5: #2bb673;   /* vivid green — excellent */
    --c4: #8fd4a3;   /* fresh mint — good */
    --c3: #d4d4d4;   /* neutral gray — neutral */
    --c2: #9ec5ef;   /* sky blue — low */
    --c1: #4a90e2;   /* vivid blue — rough */

    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
    --shadow:    0 6px 24px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 18px 48px rgba(0, 0, 0, 0.08);

    --r-sm: 14px;
    --r:    22px;
    --r-lg: 32px;
    --r-xl: 44px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    letter-spacing: -0.015em;
  }
  body {
    min-height: 100dvh;
    position: relative;
  }
  /* Ambient soft blobs for atmosphere */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(600px 400px at 10% -5%,  rgba(43,182,115,0.05)  0%, transparent 60%),
      radial-gradient(500px 400px at 100% 20%, rgba(74,144,226,0.05)  0%, transparent 55%),
      radial-gradient(700px 500px at 50% 110%, rgba(0,0,0,0.025)      0%, transparent 60%);
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* ================ HEADER ================ */
  header {
    padding: 28px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 38px;
    line-height: 1;
    letter-spacing: -0.03em;
    font-style: italic;
    color: var(--ink);
  }
  .logo .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-left: 1px;
    vertical-align: super;
    transform: translateY(-8px);
  }
  .date-pill {
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ================ SCREENS ================ */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .screen {
    display: none;
    flex: 1;
    flex-direction: column;
    animation: rise 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .screen.active { display: flex; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ================ QUESTION ================ */
  .question {
    padding: 28px 28px 28px;
    font-family: 'Instrument Serif', 'Pretendard Variable', serif;
    font-size: 46px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .question em {
    font-style: italic;
    color: var(--accent);
  }

  /* Selection count chip */
  .select-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 10px;
    min-width: 28px; height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 14px;
    font-weight: 600;
    font-style: normal;
    vertical-align: 8px;
    transition: transform 0.3s cubic-bezier(0.3,1.4,0.5,1), opacity 0.25s;
  }
  .select-count.hidden {
    opacity: 0;
    transform: scale(0.4);
  }

  /* ================ LEVELS (Step 1) ================ */
  .levels {
    padding: 4px 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .level {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 22px;
    background: var(--surface);
    border: none;
    border-radius: var(--r);
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    color: var(--ink);
    box-shadow: var(--shadow-sm);
    transition:
      transform 0.3s cubic-bezier(0.2,0.8,0.2,1),
      box-shadow 0.3s ease,
      background 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .level::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: var(--level-color, var(--accent));
    border-radius: 0 6px 6px 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .level:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .level:hover::before { opacity: 1; }
  .level:active {
    transform: scale(0.98);
    background: var(--level-color, var(--surface));
  }
  .level > * { pointer-events: none; }
  .level .face {
    width: 48px; height: 48px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .level .label {
    flex: 1;
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .level .num {
    font-size: 13px;
    color: var(--ink-mute);
    font-weight: 500;
    font-feature-settings: "tnum";
  }

  /* ================ REASONS (Step 2) ================ */
  .current-level {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 8px 10px;
    margin: 0 28px 4px;
    width: fit-content;
    background: var(--surface);
    border-radius: 999px;
    box-shadow: var(--shadow-sm);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
  }
  .current-level .face {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .reasons {
    padding: 4px 20px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .reason {
    padding: 20px 18px;
    background: var(--surface);
    border: none;
    border-radius: var(--r);
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    color: var(--ink);
    box-shadow: var(--shadow-sm);
    transition:
      transform 0.3s cubic-bezier(0.2,0.8,0.2,1),
      box-shadow 0.3s,
      background 0.3s,
      color 0.3s;
    position: relative;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .reason:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .reason:active { transform: scale(0.97); }
  .reason > * { pointer-events: none; }
  .reason.selected {
    background: var(--ink);
    color: #fff;
    box-shadow: var(--shadow-lg);
  }
  .reason.selected .sub-text { color: rgba(255,255,255,0.55); }
  .reason.disabled {
    opacity: 0.35;
    pointer-events: none;
    filter: saturate(0.5);
  }
  .reason .icon {
    width: 40px; height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border-radius: 50%;
    background: var(--bg-warm);
    margin-bottom: 12px;
    transition: background 0.3s;
  }
  .reason.selected .icon {
    background: rgba(255,255,255,0.12);
  }
  .reason .text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }
  .reason .text em {
    font-style: normal;
    color: inherit;
  }
  .reason .sub-text {
    font-size: 12px;
    color: var(--ink-mute);
    margin-top: 4px;
    line-height: 1.4;
    font-weight: 400;
    transition: color 0.3s;
  }
  .reason-full {
    grid-column: 1 / -1;
    min-height: 90px;
  }

  /* ================ NOTE ================ */
  .note-wrap {
    padding: 12px 20px 16px;
  }
  textarea.note {
    width: 100%;
    min-height: 72px;
    padding: 16px 18px;
    border: none;
    border-radius: var(--r);
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    resize: none;
    line-height: 1.5;
    letter-spacing: -0.01em;
    transition: box-shadow 0.3s, background 0.3s;
  }
  textarea.note::placeholder {
    color: var(--ink-mute);
  }
  textarea.note:focus {
    outline: none;
    box-shadow: var(--shadow);
    background: #fff;
  }

  /* ================ BUTTONS ================ */
  .actions {
    padding: 8px 20px 28px;
    padding-bottom: max(28px, env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    margin-top: auto;
  }
  button.btn {
    flex: 1;
    padding: 18px 22px;
    border: none;
    border-radius: 999px;
    background: var(--surface);
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: -0.01em;
    box-shadow: var(--shadow-sm);
    transition:
      transform 0.2s cubic-bezier(0.2,0.8,0.2,1),
      box-shadow 0.3s,
      background 0.3s,
      opacity 0.3s;
  }
  button.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  button.btn:active { transform: scale(0.97); }
  button.btn.primary {
    background: var(--ink);
    color: #fff;
    flex: 2;
  }
  button.btn.primary:disabled {
    background: var(--surface-2);
    color: var(--ink-mute);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  button.btn.ghost {
    flex: 0 0 60px;
    background: var(--surface);
    font-size: 20px;
    padding: 0;
    color: var(--ink-soft);
  }

  /* ================ DONE / RESULT ================ */
  .done {
    padding: 28px 28px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .done .big-face {
    width: 132px; height: 132px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: var(--surface);
    box-shadow: var(--shadow-lg);
    margin-bottom: 16px;
    animation: pop 0.7s cubic-bezier(0.3, 1.5, 0.5, 1);
    position: relative;
  }
  /* Glow rings on celebrate */
  .done.celebrate .big-face {
    animation: pop 0.7s cubic-bezier(0.3, 1.5, 0.5, 1), bounce 1.6s 0.5s ease-in-out;
  }
  .done.celebrate .big-face::before,
  .done.celebrate .big-face::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    opacity: 0;
    animation: ring 1.6s ease-out forwards;
    pointer-events: none;
  }
  .done.celebrate .big-face::after {
    animation-delay: 0.4s;
    border-color: var(--c5);
  }
  @keyframes pop {
    0%   { transform: scale(0.2); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  @keyframes bounce {
    0%, 100% { transform: scale(1) translateY(0); }
    25%      { transform: scale(1.06) translateY(-6px); }
    50%      { transform: scale(0.98) translateY(0); }
    75%      { transform: scale(1.03) translateY(-2px); }
  }
  @keyframes ring {
    0%   { transform: scale(0.8); opacity: 0.7; }
    80%  { opacity: 0.15; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  .done h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 34px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.02em;
    margin: 0;
    line-height: 1.1;
    color: var(--ink);
    transition: transform 0.5s cubic-bezier(0.3,1.5,0.5,1);
  }
  .done.celebrate h2 {
    animation: titleRise 0.8s cubic-bezier(0.3, 1.4, 0.5, 1);
  }
  @keyframes titleRise {
    0%   { transform: translateY(20px) scale(0.9); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* "Today's check-in done" badge */
  .done-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px 6px 12px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: #1a6b3f;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 18px;
    animation: fadeIn 0.5s 0.3s both;
  }
  .done-badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(43,182,115,0.6);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(43,182,115,0.6); }
    50%  { box-shadow: 0 0 0 6px rgba(43,182,115,0); }
    100% { box-shadow: 0 0 0 0 rgba(43,182,115,0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Next check-in meta */
  .next-checkin {
    margin-top: 12px;
    font-size: 13px;
    color: var(--ink-mute);
    font-weight: 500;
    letter-spacing: -0.01em;
    animation: fadeIn 0.5s 0.6s both;
  }
  .next-checkin .countdown {
    color: var(--ink);
    font-feature-settings: "tnum";
    font-weight: 600;
  }

  /* ================ CHART + STATS ================ */
  .chart-wrap {
    padding: 4px 20px 12px;
  }
  .chart-box {
    background: var(--surface);
    border-radius: var(--r-lg);
    padding: 20px 16px 8px;
    box-shadow: var(--shadow-sm);
    height: 210px;
    position: relative;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 4px 20px 10px;
  }
  .stat {
    background: var(--surface);
    border-radius: var(--r);
    padding: 14px 10px;
    text-align: center;
    box-shadow: var(--shadow-sm);
  }
  .stat .v {
    font-family: 'Instrument Serif', serif;
    font-size: 30px;
    font-weight: 400;
    font-style: italic;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
  }
  .stat .k {
    font-size: 11px;
    color: var(--ink-mute);
    margin-top: 6px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ================ ENTRIES LIST ================ */
  .entries {
    padding: 16px 20px 20px;
  }
  .day-group {
    background: var(--surface);
    border-radius: var(--r-lg);
    padding: 6px 8px;
    margin-bottom: 10px;
    box-shadow: var(--shadow-sm);
  }
  .entries h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-mute);
    padding: 10px 14px 6px;
    margin: 0;
    letter-spacing: 0;
  }
  .entry {
    display: flex;
    gap: 12px;
    padding: 10px 14px;
    border-radius: var(--r);
    align-items: flex-start;
    transition: background 0.2s;
  }
  .entry:hover { background: var(--bg-warm); }
  .entry .e-face {
    width: 40px; height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .entry .e-body { flex: 1; min-width: 0; }
  .entry .e-meta {
    font-size: 11px;
    color: var(--ink-mute);
    margin-bottom: 6px;
    font-weight: 500;
    font-feature-settings: "tnum";
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .entry .e-level {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .entry .e-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .entry .e-chip {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--bg-warm);
    color: var(--ink-soft);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .entry .e-note {
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 8px;
    line-height: 1.45;
  }

  /* SVG face icons */
  .face-svg {
    width: 48px; height: 48px;
    flex-shrink: 0;
    display: block;
  }
  .face-svg-sm { width: 36px; height: 36px; }
  .face-svg-lg { width: 96px; height: 96px; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-mute);
    font-size: 16px;
    background: var(--surface);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
  }

  /* ================ HEADER USER BUTTON ================ */
  .user-btn {
    border: none;
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    padding: 0;
    width: 38px; height: 38px;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .user-btn:active { transform: scale(0.94); }
  .user-btn img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .user-btn .anon {
    color: var(--ink-mute);
    font-size: 18px;
  }

  /* User dropdown menu */
  .user-menu {
    position: absolute;
    top: 72px; right: 24px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    padding: 8px;
    min-width: 220px;
    z-index: 50;
    animation: dropIn 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .user-menu[hidden] { display: none; }
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-8px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .user-menu-info {
    padding: 12px 14px 10px;

  .onboard::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(600px 400px at 10% -5%,  rgba(43,182,115,0.08)  0%, transparent 60%),
      radial-gradient(500px 400px at 100% 100%, rgba(74,144,226,0.06)  0%, transparent 55%);
  }

  .onboard-track {
    flex: 1;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    position: relative;
    z-index: 1;
  }

  .onboard-slide {
    flex: 0 0 100%;
    min-width: 100%;
    max-width: 480px;
    margin: 0 auto;
    scroll-snap-align: center;
    padding: 60px 32px 30px;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

<script>
const LEVELS = [
  { n: 5, k: '아주 좋아', color: 'var(--c5)' },
  { n: 4, k: '좋아',      color: 'var(--c4)' },
  { n: 3, k: '그럭저럭',  color: 'var(--c3)' },
  { n: 2, k: '별로야',    color: 'var(--c2)' },
  { n: 1, k: '힘들어',    color: 'var(--c1)' },
];
const LEVEL_HEX = { 5:'#2bb673', 4:'#8fd4a3', 3:'#d4d4d4', 2:'#9ec5ef', 1:'#4a90e2' };

/* SVG face generator — returns an <svg> string with a distinct face per level.
   Uses a soft colored circle + ink stroke features. Readable at 22–132px. */
function faceSVG(level, size = 48, cls = 'face-svg') {
  const fill = LEVEL_HEX[level];
  const strokeColor = '#1a1a1a';
  const sw = 2.4;
  const blush = 'rgba(255,120,120,0.32)';

  let features = '';
  switch (level) {
    case 5: // radiant: closed happy eyes (^ ^), wide upward smile, cheek blush
      features = `
        <!-- blushes -->
        <circle cx="13" cy="28.5" r="2.8" fill="${blush}"/>
        <circle cx="35" cy="28.5" r="2.8" fill="${blush}"/>
        <!-- happy closed eyes -->
        <path d="M14 22 Q17 18.5 20 22"      fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
        <path d="M28 22 Q31 18.5 34 22"      fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
        <!-- big happy smile -->
        <path d="M15 30 Q24 40 33 30"        fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
      `;
      break;
    case 4: // content: round eyes, gentle upward smile
      features = `
        <circle cx="17" cy="21" r="1.9" fill="${strokeColor}"/>
        <circle cx="31" cy="21" r="1.9" fill="${strokeColor}"/>
        <path d="M16 30 Q24 36 32 30"        fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
      `;
      break;
    case 3: // neutral: flat small eyes, straight mouth
      features = `
        <circle cx="17" cy="21" r="1.7" fill="${strokeColor}"/>
        <circle cx="31" cy="21" r="1.7" fill="${strokeColor}"/>
        <line x1="17" y1="31.5" x2="31" y2="31.5" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
      `;
      break;
    case 2: // low: droopy eyes, slight downward mouth
      features = `
        <!-- droopy eyes (lines angled outward) -->
        <path d="M14 20 Q17 22.2 20 20"      fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
        <path d="M28 20 Q31 22.2 34 20"      fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
        <!-- small down mouth -->
        <path d="M17 33 Q24 29 31 33"        fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
      `;
      break;
    case 1: // rough: squeezed eyes (small crosses/squiggles), big frown
      features = `
        <!-- squeezed X eyes -->
        <path d="M14.5 19 L19.5 23 M19.5 19 L14.5 23" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
        <path d="M28.5 19 L33.5 23 M33.5 19 L28.5 23" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
        <!-- big frown -->
        <path d="M16 34 Q24 27 32 34"        fill="none" stroke="${strokeColor}" stroke-width="${sw}" stroke-linecap="round"/>
      `;
      break;
  }

  return `<svg class="${cls}" viewBox="0 0 48 48" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="24" cy="24" r="22" fill="${fill}"/>

  </svg>`;
}

/* ================ ONBOARDING ================ */
const ONBOARD_FLAG_KEY = 'howru:onboarded';

let onboardCurrentSlide = 0;
const ONBOARD_TOTAL = 3;

function shouldShowOnboarding() {
  // Show only once per user (per device). Track flag in localStorage.
  return !localStorage.getItem(ONBOARD_FLAG_KEY);
}

function markOnboardingDone() {
  localStorage.setItem(ONBOARD_FLAG_KEY, '1');
}

function openOnboarding() {
  const modal = $('onboardModal');
  if (!modal) return;
  modal.hidden = false;
  onboardCurrentSlide = 0;
  // Reset scroll position
  const track = $('onboardTrack');
  if (track) track.scrollLeft = 0;
  updateOnboardUI();
}

function closeOnboarding() {
  const modal = $('onboardModal');
  if (!modal) return;
  modal.hidden = true;
  markOnboardingDone();

  // If user signed up mid-save, resume the save now
  const pending = window._postOnboardingEntry;
  window._postOnboardingEntry = null;
  if (pending) {
    completeSave(pending);
  }
}

function updateOnboardUI() {
  // Update dots
  document.querySelectorAll('.onboard-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === onboardCurrentSlide);
  });
  // Update next button text + style
  const nextBtn = $('onboardNext');
  if (nextBtn) {
    if (onboardCurrentSlide === ONBOARD_TOTAL - 1) {
      nextBtn.textContent = '시작하기';
      nextBtn.classList.add('final');
    } else {
      nextBtn.textContent = '다음';
      nextBtn.classList.remove('final');
    }
  }
}

function onboardNext() {
  if (onboardCurrentSlide >= ONBOARD_TOTAL - 1) {
    closeOnboarding();
    return;
  }
  onboardCurrentSlide += 1;
  scrollToOnboardSlide(onboardCurrentSlide);
  updateOnboardUI();
}

function scrollToOnboardSlide(idx) {
  const track = $('onboardTrack');
  if (!track) return;
  const slide = track.children[idx];
  if (slide) {
    track.scrollTo({ left: slide.offsetLeft, behavior: 'smooth' });
  }
}

function setupOnboardScrollSync() {
  const track = $('onboardTrack');
  if (!track) return;
  let scrollTimeout;
  track.addEventListener('scroll', () => {
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      // Detect which slide is currently visible by scroll position
      const slideWidth = track.offsetWidth;
      const idx = Math.round(track.scrollLeft / slideWidth);
      if (idx !== onboardCurrentSlide && idx >= 0 && idx < ONBOARD_TOTAL) {
        onboardCurrentSlide = idx;
        updateOnboardUI();
      }
    }, 80);
  });
}

/* Storage — localStorage only. One entry per day (key = YYYY-MM-DD). */
const KEY_PREFIX = 'howru:entry:';

function dateKey(ts) {
  const d = new Date(ts);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

async function saveEntry(entry) {
  // Key by date — same-day saves overwrite previous entry (up until midnight)
  const key = `${KEY_PREFIX}${dateKey(entry.ts)}`;
  const value = JSON.stringify(entry);
  localStorage.setItem(key, value);
  return { ok: true };
}

async function loadEntries() {
  const entries = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(KEY_PREFIX)) {
        try {
          const v = localStorage.getItem(k);
          if (v) entries.push(JSON.parse(v));
        } catch(e) {}
      }
    }
  } catch(e) {
    console.error('load err', e);
  }
  entries.sort((a,b) => b.ts - a.ts);
  return entries;
}

// Check if today's entry exists and is "locked" (past midnight = from a different date)
function getTodaysEntry() {
  try {
    const key = `${KEY_PREFIX}${dateKey(Date.now())}`;
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch(e) { return null; }
}

const $ = (id) => document.getElementById(id);
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Legacy key migration
const LEGACY_MAP = {
  body_in: 'body', mind_in: 'unknown', body_ex: 'env', mind_ex: 'relation', mind: 'unknown',
};
function migrateKey(k) {
  if (REASONS_MATRIX[k]) return k;
  if (LEGACY_MAP[k]) return LEGACY_MAP[k];
  return 'unknown';
}
function reasonsOf(entry) {
  if (Array.isArray(entry.reasons)) return entry.reasons.map(migrateKey);
  if (entry.reason) return [migrateKey(entry.reason)];
  return [];
}

function toggleReason(k) {
  const isUnknown = (k === 'unknown');
  const alreadySelected = state.reasons.includes(k);
  if (alreadySelected) {
    state.reasons = state.reasons.filter(x => x !== k);
  } else {
    if (isUnknown) state.reasons = ['unknown'];
    else {
      state.reasons = state.reasons.filter(x => x !== 'unknown');
      state.reasons.push(k);
    }
  }
  updateReasonUI();
}

function updateReasonUI() {
  const hasUnknown = state.reasons.includes('unknown');
  const hasOther = state.reasons.some(r => r !== 'unknown');
  document.querySelectorAll('.reason').forEach(el => {
    const key = el.dataset.key;
    const selected = state.reasons.includes(key);
    el.classList.toggle('selected', selected);
    let disabled = false;
    if (key === 'unknown' && hasOther) disabled = true;
    if (key !== 'unknown' && hasUnknown) disabled = true;
    el.classList.toggle('disabled', disabled);
  });
  const count = state.reasons.length;
  const countEl = $('selectCount');
  if (countEl) {
    countEl.textContent = count;
    countEl.classList.toggle('hidden', count === 0);
  }
  $('saveBtn').disabled = (count === 0);
}

/* ================ NEXT CHECK-IN COUNTDOWN ================ */
let nextCheckinInterval = null;

function updateNextCheckin() {
  const el = $('nextCheckin');
  if (!el) return;
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(now.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  const ms = tomorrow.getTime() - now.getTime();
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  let countdown;
  if (h > 0) countdown = `${h}시간 ${m}분`;
  else if (m > 0) countdown = `${m}분`;
  else countdown = '잠시';
  el.innerHTML = `다음 체크인까지 <span class="countdown">${countdown}</span>`;
}

function startCountdown() {
  if (nextCheckinInterval) clearInterval(nextCheckinInterval);
  updateNextCheckin();
  // Update every minute
  nextCheckinInterval = setInterval(updateNextCheckin, 60 * 1000);
}

function stopCountdown() {
  if (nextCheckinInterval) {
    clearInterval(nextCheckinInterval);
    nextCheckinInterval = null;
  }
}

async function save() {
  if (!state.level || state.reasons.length === 0) return;
  const entry = {
    id: `${Date.now()}`,
    ts: Date.now(),
    level: state.level,
    reasons: state.reasons.slice(),
    note: $('note').value.trim()
  };

  // Auth gate: require login before saving
  if (!state.user) {
    $('saveBtn').disabled = true;
    $('saveBtn').textContent = '저장 중...';
    openLoginModal(entry);
    return;
  }

  $('saveBtn').disabled = true;
  $('saveBtn').textContent = '저장 중...';
  await completeSave(entry);
}

async function completeSave(entry) {
  try {
    await saveEntry(entry);
    const lv = LEVELS.find(l => l.n === entry.level);
    $('doneFace').innerHTML = faceSVG(lv.n, 96);
    const titles = {
      5: '좋은 날이었네',
      4: '잘 보냈어',
      3: '평범한 하루',
      2: '수고했어',
      1: '여기까지 잘 왔어'
    };
    $('doneTitle').textContent = titles[entry.level];
    showScreen('result');
    renderHistory();
    // Celebrate fresh save with confetti + bounce animation
    setTimeout(() => {
      celebrateOnce();
      fireConfetti(entry.level);
    }, 100);
    if ($('saveBtn')) {
      $('saveBtn').disabled = false;
      $('saveBtn').textContent = '저장';
    }
  } catch (e) {
    console.error('[save] error:', e);
    if ($('saveBtn')) {
      $('saveBtn').textContent = '❌ ' + ((e && e.message) ? e.message : String(e)).slice(0, 40);
      $('saveBtn').disabled = false;
      setTimeout(() => { $('saveBtn').textContent = '저장'; }, 4000);
    }
  }
}

let chart = null;

async function renderHistory() {
  $('entries').innerHTML = '';
  const entries = await loadEntries();
  state.entries = entries;

  if (!entries.length) {
    $('entries').innerHTML = '<div class="empty">첫 기록이야.</div>';
    $('statAvg').textContent = '–';
    $('statCount').textContent = '0';
    $('statStreak').textContent = '0';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  const avg = entries.reduce((s,e) => s+e.level, 0) / entries.length;
  $('statAvg').textContent = avg.toFixed(1);
  $('statCount').textContent = entries.length;
  $('statStreak').textContent = calcStreak(entries);

  // Build 30-day axis (newest day = today, oldest = 29 days ago)
  // Each day either has an entry (hide gaps with spanGaps) or is null
  const byDay = {};
  entries.forEach(e => {
    byDay[dateKey(e.ts)] = e;
  });
  const labels = [];
  const data = [];
  const pointColors = [];
  const now = new Date();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    const k = dateKey(d.getTime());
    const entry = byDay[k];
    labels.push(`${d.getMonth()+1}/${d.getDate()}`);
    if (entry) {
      data.push(entry.level);
      pointColors.push(LEVEL_HEX[entry.level]);
    } else {
      data.push(null);
      pointColors.push('rgba(0,0,0,0)');
    }
  }

  if (chart) chart.destroy();
  const ctx = $('histChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        spanGaps: true,
        borderColor: '#2bb673',
        backgroundColor: (context) => {
          const ch = context.chart;
          const { ctx, chartArea } = ch;
          if (!chartArea) return 'rgba(43,182,115,0.08)';
          const g = ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
          g.addColorStop(0, 'rgba(43,182,115,0.22)');
          g.addColorStop(1, 'rgba(43,182,115,0)');
          return g;
        },
        borderWidth: 2.5,
        tension: 0.45,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: pointColors,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        fill: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 12, bottom: 4, left: 4, right: 4 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          titleFont: { family: 'Pretendard Variable', size: 11, weight: '600' },
          titleColor: '#8fd4a3',
          bodyFont: { family: 'Pretendard Variable', size: 13 },
          bodyColor: '#fff',
          padding: 12,
          cornerRadius: 12,
          displayColors: false,
          filter: (item) => item.parsed.y !== null,   // hide tooltip on empty days
          callbacks: {
            title: (items) => items[0].label.replace('/', '월 ') + '일',
            label: (c) => {
              // Find the entry for this x-index
              const idx = c.dataIndex;
              const daysAgo = 29 - idx;
              const d = new Date();
              d.setDate(d.getDate() - daysAgo);
              const e = byDay[dateKey(d.getTime())];
              if (!e) return '';
              const lv = LEVELS.find(l => l.n === e.level);
              const rs = reasonsOf(e).map(k => REASON_SHORT[k]).join(' · ');
              return `${lv.k} (${lv.n}) — ${rs}`;
            }
          }
        }
      },
      scales: {
        y: {
          min: 0.5, max: 5.5,
          ticks: {
            stepSize: 1,
            font: { family: 'Pretendard Variable', size: 11, weight: '600' },
            color: '#a89f92',
            padding: 8,
            callback: (v) => (v >= 1 && v <= 5) ? v : ''
          },
          grid: { color: 'rgba(0,0,0,0.04)', drawTicks: false },
          border: { display: false }
        },
        x: {
          ticks: {
            font: { family: 'Pretendard Variable', size: 10, weight: '500' },
            color: '#a89f92',
            maxRotation: 0,
            autoSkip: true,
            maxTicksLimit: 6,
            padding: 6,
          },
          grid: { display: false },
          border: { display: false }
        }
      }
    }
  });

  const host = $('entries');
  host.innerHTML = '';
  const groups = groupByDay(entries);
  Object.entries(groups).forEach(([day, list]) => {
    const group = document.createElement('div');
    group.className = 'day-group';
    const h = document.createElement('h3');
    h.textContent = day;
    group.appendChild(h);
    list.forEach(e => {
      const lv = LEVELS.find(l => l.n === e.level);
      const d = new Date(e.ts);
      const timeStr = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
      const rsKeys = reasonsOf(e);
      const chips = rsKeys
        .map(k => `<span class="e-chip">${REASON_SHORT[k]}</span>`)
        .join('');
      const row = document.createElement('div');
      row.className = 'entry';
      row.innerHTML = `
        <div class="e-face">${faceSVG(e.level, 40)}</div>
        <div class="e-body">
          <div class="e-meta">
            <span class="e-level">${lv.k}</span>
            <span>${timeStr}</span>
          </div>
          <div class="e-chips">${chips}</div>
          ${e.note ? `<div class="e-note">${escapeHtml(e.note)}</div>` : ''}
        </div>
      `;
      group.appendChild(row);
    });
    host.appendChild(group);
  });
}

function groupByDay(entries) {
  const groups = {};
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const yesterday = today - 86400000;
  entries.slice(0, 100).forEach(e => {
    const d = new Date(e.ts);
    const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    let key;
    if (dayStart === today) key = '오늘';
    else if (dayStart === yesterday) key = '어제';
    else key = `${d.getMonth()+1}월 ${d.getDate()}일`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });
  return groups;
}

function calcStreak(entries) {
  if (!entries.length) return 0;
  const days = new Set();
  entries.forEach(e => {
    const d = new Date(e.ts);
    days.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  });
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    const k = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (days.has(k)) streak++;
    else if (i === 0) continue;
    else break;
  }
  return streak;
}

function initApp() {
  setHeaderDate();
  renderLevels();
  setupAuth();

  const backBtn = $('backBtn');
  const saveBtn = $('saveBtn');
  const againBtn = $('againBtn');
  if (backBtn) backBtn.addEventListener('click', () => {
    state.reasons = [];
    showScreen('level');
  });
  if (saveBtn) saveBtn.addEventListener('click', save);
  if (againBtn) againBtn.addEventListener('click', goToCheckin);

  // User profile button + dropdown
  const userBtn = $('userBtn');
  if (userBtn) userBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleUserMenu();
  });
  // Click outside to close menu
  document.addEventListener('click', (e) => {
    const menu = $('userMenu');
    if (menu && !menu.hidden && !menu.contains(e.target)) {
      menu.hidden = true;
    }
  });

  // Login modal handlers
  const googleBtn = $('googleSignInBtn');
  const closeBtn = $('modalCloseBtn');
  const backdrop = $('modalBackdrop');
  if (googleBtn) googleBtn.addEventListener('click', handleGoogleSignIn);
  if (closeBtn) closeBtn.addEventListener('click', closeLoginModal);
  if (backdrop) backdrop.addEventListener('click', closeLoginModal);

  // Onboarding handlers
  const onboardNextBtn = $('onboardNext');
  const onboardSkipBtn = $('onboardSkip');
  if (onboardNextBtn) onboardNextBtn.addEventListener('click', onboardNext);
  if (onboardSkipBtn) onboardSkipBtn.addEventListener('click', closeOnboarding);
  setupOnboardScrollSync();

  // If today already has an entry, skip check-in and show the journal
  const today = getTodaysEntry();
  if (today) {
    showTodayResult(today);
  }
}

function showTodayResult(entry) {
  const lv = LEVELS.find(l => l.n === entry.level);
  $('doneFace').innerHTML = faceSVG(lv.n, 96);
  const titles = {
    5: '좋은 날이었네',
    4: '잘 보냈어',
    3: '평범한 하루',
    2: '수고했어',
    1: '여기까지 잘 왔어'
  };
  $('doneTitle').textContent = titles[entry.level];
  showScreen('result');
  renderHistory();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
